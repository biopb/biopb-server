name: Docker Build and Push

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated, e.g., "cellpose,lacss" or "all")'
        required: true
        default: 'all'
        type: string
      push:
        description: 'Push to registry'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: jiyuuchc

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_dirs: ${{ steps.prepare.outputs.build_dirs }}
      push: ${{ steps.prepare.outputs.push }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare build matrix
        id: prepare
        run: |
          # Discover all services with Dockerfiles
          ALL_DIRS=$(ls -1 */Dockerfile 2>/dev/null | cut -d'/' -f1 | sort -u)

          INPUT="${{ inputs.services }}"
          PUSH="${{ inputs.push }}"

          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            # Build all services
            BUILD_DIRS=$(echo "$ALL_DIRS" | jq -R . | jq -s .)
          else
            # Build specified services (comma-separated)
            BUILD_DIRS=$(echo "$INPUT" | tr ',' '\n' | while read dir; do
              dir=$(echo "$dir" | tr -d ' ')
              if [ -f "$dir/Dockerfile" ]; then
                echo "\"$dir\""
              else
                echo "Warning: $dir/Dockerfile not found, skipping" >&2
              fi
            done | jq -s .)
          fi

          echo "build_dirs=$BUILD_DIRS" >> $GITHUB_OUTPUT
          echo "push=$PUSH" >> $GITHUB_OUTPUT
          echo "Building: $BUILD_DIRS"

      - name: Build summary
        run: |
          echo "## Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: ${{ inputs.services }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Push to registry**: ${{ inputs.push }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build matrix**: ${{ steps.prepare.outputs.build_dirs }}" >> $GITHUB_STEP_SUMMARY

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_dir: ${{ fromJson(needs.prepare.outputs.build_dirs) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ -f "${{ matrix.build_dir }}/VERSION" ]; then
            VERSION=$(cat "${{ matrix.build_dir }}/VERSION" | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.build_dir }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ needs.prepare.outputs.push == 'true' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.push == 'true' }}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.build_dir }}
          push: ${{ needs.prepare.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Build summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.build_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pushed**: ${{ needs.prepare.outputs.push }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY