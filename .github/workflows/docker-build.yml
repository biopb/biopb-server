name: Docker Build and Push

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated, e.g., "cellpose,lacss" or "all")'
        required: true
        default: 'all'
        type: string
      push:
        description: 'Push to registry'
        required: true
        default: true
        type: boolean
  push:
    branches:
      - master
    paths:
      - '*/VERSION'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: jiyuuchc

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_dirs: ${{ steps.prepare.outputs.build_dirs }}
      push: ${{ steps.prepare.outputs.push }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to diff which VERSION files changed

      - name: Prepare build matrix
        id: prepare
        run: |
          dirs_to_json() {
            while read -r dir; do
              dir=$(echo "$dir" | tr -d ' ')
              [ -z "$dir" ] && continue
              if [ -f "$dir/Dockerfile" ]; then
                echo "\"$dir\""
              else
                echo "Warning: $dir/Dockerfile not found, skipping" >&2
              fi
            done | jq -sc .
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            # VERSION bump on master: build only services whose VERSION changed; always push.
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="${{ github.sha }}^"
            fi
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- '*/VERSION' \
                      | cut -d'/' -f1 | sort -u || true)
            BUILD_DIRS=$(echo "$CHANGED" | dirs_to_json)
            PUSH="true"
          else
            # Manual dispatch: honor the services/push inputs.
            INPUT="${{ inputs.services }}"
            PUSH="${{ inputs.push }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              ALL_DIRS=$(ls -1 */Dockerfile 2>/dev/null | cut -d'/' -f1 | sort -u)
              BUILD_DIRS=$(echo "$ALL_DIRS" | dirs_to_json)
            else
              BUILD_DIRS=$(echo "$INPUT" | tr ',' '\n' | dirs_to_json)
            fi
          fi

          echo "build_dirs=$BUILD_DIRS" >> $GITHUB_OUTPUT
          echo "push=$PUSH" >> $GITHUB_OUTPUT
          echo "Building: $BUILD_DIRS (push=$PUSH)"

      - name: Build summary
        run: |
          echo "## Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build matrix**: ${{ steps.prepare.outputs.build_dirs }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Push to registry**: ${{ steps.prepare.outputs.push }}" >> $GITHUB_STEP_SUMMARY

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_dir: ${{ fromJson(needs.prepare.outputs.build_dirs) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ -f "${{ matrix.build_dir }}/VERSION" ]; then
            VERSION=$(cat "${{ matrix.build_dir }}/VERSION" | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.build_dir }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ needs.prepare.outputs.push == 'true' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.push == 'true' }}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.build_dir }}
          push: ${{ needs.prepare.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Build summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.build_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pushed**: ${{ needs.prepare.outputs.push }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY