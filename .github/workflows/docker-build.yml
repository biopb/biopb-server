name: Docker Build and Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_dir:
        description: 'Specific build directory to build (optional, builds all if empty)'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: jiyuuchc

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      build_dirs: ${{ steps.detect.outputs.build_dirs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed build directories
        id: detect
        run: |
          # Get list of all build directories
          ALL_DIRS=$(ls -1 */Dockerfile 2>/dev/null | cut -d'/' -f1 | sort -u | jq -R . | jq -s .)
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PR, just list all dirs for validation
            echo "build_dirs=$ALL_DIRS" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.build_dir }}" ]; then
            # Manual dispatch with specific directory
            DIR="${{ github.event.inputs.build_dir }}"
            if [ -f "$DIR/Dockerfile" ]; then
              echo "build_dirs=[\"$DIR\"]" >> $GITHUB_OUTPUT
            else
              echo "Error: Directory $DIR not found" >&2
              exit 1
            fi
          else
            # For push to main, detect changed directories
            if [ "${{ github.event_name }}" = "push" ]; then
              CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | grep '/Dockerfile$' | cut -d'/' -f1 | sort -u)
              VERSION_CHANGES=$(git diff --name-only HEAD~1 HEAD | grep '/VERSION$' | cut -d'/' -f1 | sort -u)
              
              # Combine and deduplicate
              ALL_CHANGES=$(echo -e "$CHANGED_DIRS\n$VERSION_CHANGES" | sort -u | grep -v '^$' | jq -R . | jq -s .)
              
              if [ -n "$ALL_CHANGES" ]; then
                echo "build_dirs=$ALL_CHANGES" >> $GITHUB_OUTPUT
              else
                # Check for common file changes in any directory
                COMMON_CHANGES=$(git diff --name-only HEAD~1 HEAD | grep -E '^(base|cellpose|cellpose-sam|ctxseg|ctxseg-d|lacss|osilab|samcell)/' | cut -d'/' -f1 | sort -u | jq -R . | jq -s .)
                echo "build_dirs=$COMMON_CHANGES" >> $GITHUB_OUTPUT
              fi
            else
              echo "build_dirs=$ALL_DIRS" >> $GITHUB_OUTPUT
            fi
          fi

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_dir: ${{ fromJson(needs.detect-changes.outputs.build_dirs) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ -f "${{ matrix.build_dir }}/VERSION" ]; then
            VERSION=$(cat "${{ matrix.build_dir }}/VERSION" | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.build_dir }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=,format=short,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=,format=short,enable=${{ github.event_name == 'pull_request' }},suffix=-pr

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.build_dir }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.build_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Git SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY